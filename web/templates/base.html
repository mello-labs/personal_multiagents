<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <title>{% block title %}Multiagentes{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #000;
        --s1: #0a0a0a;
        --s2: #141414;
        --s3: #1c1c1e;
        --s4: #2c2c2e;
        --s5: #3a3a3c;
        --sep: rgba(255,255,255,0.06);
        --text: #f5f5f7;
        --t2: rgba(255,255,255,0.55);
        --t3: rgba(255,255,255,0.28);
        --t4: rgba(255,255,255,0.12);
        --blue: #0a84ff;
        --blue-dim: rgba(10,132,255,0.12);
        --green: #30d158;
        --green-dim: rgba(48,209,88,0.12);
        --red: #ff453a;
        --red-dim: rgba(255,69,58,0.12);
        --yell: #ffd60a;
        --yell-dim: rgba(255,214,10,0.1);
        --cyan: #64d2ff;
        --orange: #ff9f0a;
        --r: 16px;
        --rs: 12px;
        --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        --mono: "SF Mono", "Fira Code", ui-monospace, monospace;
        --tab-h: 52px;
        --safe-b: env(safe-area-inset-bottom, 0px);
        --safe-t: env(safe-area-inset-top, 0px);
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: contain;
      }

      /* ══ Shell ══ */
      .shell { display: flex; flex-direction: column; height: 100dvh; }

      /* ══ Header ══ */
      .hdr {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 16px 8px;
        padding-top: calc(var(--safe-t) + 6px);
        background: rgba(0,0,0,0.82);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 0.5px solid var(--sep);
        flex-shrink: 0;
        z-index: 20;
      }
      .hdr-title {
        flex: 1;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.4px;
      }
      .hdr-right { display: flex; align-items: center; gap: 8px; }
      .hdr-clock {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--t3);
        font-variant-numeric: tabular-nums;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--s3);
        border-radius: 100px;
        padding: 4px 10px 4px 8px;
        font-size: 10px;
        font-weight: 600;
        color: var(--t2);
        letter-spacing: 0.2px;
      }
      .pill-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px rgba(48,209,88,0.5);
      }
      .pill-dot.off { background: var(--red); box-shadow: none; }
      .hdr-btn {
        background: var(--s3);
        border: none;
        color: var(--t2);
        border-radius: 100px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font);
        transition: all .15s;
        -webkit-tap-highlight-color: transparent;
      }
      .hdr-btn:active { background: var(--s5); color: var(--text); transform: scale(0.95); }

      /* ══ Content ══ */
      .content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding: 10px 14px 0;
        padding-bottom: calc(var(--tab-h) + var(--safe-b) + 14px);
      }

      /* ══ Tab bar ══ */
      .tabs {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 100;
        display: flex;
        align-items: stretch;
        height: calc(var(--tab-h) + var(--safe-b));
        padding-bottom: var(--safe-b);
        background: rgba(10,10,10,0.88);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        border-top: 0.5px solid var(--sep);
      }
      .tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1px;
        text-decoration: none;
        color: var(--t3);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.1px;
        padding: 4px 0 2px;
        transition: color .12s;
        -webkit-tap-highlight-color: transparent;
        position: relative;
      }
      .tab:active { transform: scale(0.9); }
      .tab.active { color: var(--blue); }
      .tab-ico { width: 24px; height: 24px; }
      .tab-ico svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .tab.active .tab-ico svg { stroke-width: 2.2; }
      .tab-badge {
        position: absolute;
        top: 2px;
        right: 50%;
        margin-right: -18px;
        min-width: 16px;
        height: 16px;
        border-radius: 8px;
        background: var(--red);
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        font-family: var(--font);
      }
      .tab-badge:empty { display: none; }

      /* ══ Cards ══ */
      .card {
        background: var(--s2);
        border: 0.5px solid var(--sep);
        border-radius: var(--r);
        overflow: hidden;
        margin-bottom: 10px;
      }
      .card-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px 8px;
      }
      .card-lbl {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.1px;
        color: var(--text);
      }
      .card-lbl-dim {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        color: var(--t3);
      }
      .card-act {
        background: none;
        border: none;
        color: var(--blue);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        padding: 0;
        font-family: var(--font);
        -webkit-tap-highlight-color: transparent;
      }
      .card-act:active { opacity: 0.6; }
      .card-body { padding: 0; }

      /* ══ Metric row ══ */
      .metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 10px;
      }
      .metric {
        background: var(--s2);
        border: 0.5px solid var(--sep);
        border-radius: var(--r);
        padding: 14px 16px 12px;
        position: relative;
        overflow: hidden;
      }
      .metric::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        border-radius: var(--r) var(--r) 0 0;
      }
      .metric.m-blue::before { background: var(--blue); }
      .metric.m-green::before { background: var(--green); }
      .metric.m-red::before { background: var(--red); }
      .metric.m-dim::before { background: var(--s5); }
      .metric-lbl {
        font-size: 11px;
        font-weight: 500;
        color: var(--t3);
        margin-bottom: 6px;
        letter-spacing: 0.1px;
      }
      .metric-val {
        font-size: 28px;
        font-weight: 700;
        font-family: var(--mono);
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .metric-sub {
        font-size: 10px;
        color: var(--t3);
        margin-top: 4px;
      }
      .v-blue { color: var(--blue); }
      .v-green { color: var(--green); }
      .v-red { color: var(--red); }
      .v-dim { color: var(--t3); }
      .v-text { font-size: 18px; font-family: var(--font); letter-spacing: -0.3px; padding-top: 2px; }
      .v-frac { font-size: 15px; color: var(--t3); }

      /* ══ Block row (agenda) ══ */
      .blk {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 16px;
        border-bottom: 0.5px solid var(--sep);
        transition: background .1s;
      }
      .blk:last-child { border-bottom: none; }
      .blk:active { background: var(--s3); }
      .blk.done { opacity: 0.45; }
      .blk-time {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--cyan);
        min-width: 82px;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }
      .blk-name {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .blk-done { text-decoration: line-through; color: var(--t3); }
      .blk-btn {
        background: none;
        border: 1.5px solid var(--s5);
        color: var(--t3);
        border-radius: 50%;
        width: 26px; height: 26px;
        cursor: pointer;
        font-size: 12px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
        transition: all .12s;
      }
      .blk-btn:active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

      /* ══ Task row ══ */
      .tsk {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 16px;
        border-bottom: 0.5px solid var(--sep);
      }
      .tsk:last-child { border-bottom: none; }
      .tsk.done .tsk-name { text-decoration: line-through; color: var(--t3); }
      .tsk-pri { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
      .pri-h { background: var(--red); box-shadow: 0 0 4px var(--red-dim); }
      .pri-m { background: var(--yell); }
      .pri-l { background: var(--s5); }
      .tsk-name {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tsk-btn {
        background: none;
        border: 1.5px solid var(--s5);
        color: var(--t3);
        border-radius: 50%;
        width: 26px; height: 26px;
        cursor: pointer;
        font-size: 12px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
        transition: all .12s;
      }
      .tsk-btn:active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
      .tsk-done-icon { color: var(--green); font-size: 13px; flex-shrink: 0; }

      /* ══ Add task ══ */
      .add-bar {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 0.5px solid var(--sep);
      }
      .add-input {
        flex: 1;
        background: var(--s3);
        border: 1px solid var(--s5);
        color: var(--text);
        padding: 10px 14px;
        border-radius: var(--rs);
        font-size: 15px;
        outline: none;
        font-family: var(--font);
        transition: border-color .15s;
      }
      .add-input:focus { border-color: var(--blue); }
      .add-select {
        background: var(--s3);
        border: 1px solid var(--s5);
        color: var(--t2);
        padding: 10px 6px;
        border-radius: var(--rs);
        font-size: 13px;
        outline: none;
        font-family: var(--font);
        cursor: pointer;
        width: 48px;
      }
      .add-btn {
        background: var(--blue);
        border: none;
        color: #fff;
        width: 40px;
        border-radius: var(--rs);
        cursor: pointer;
        font-size: 20px;
        font-weight: 300;
        font-family: var(--font);
        -webkit-tap-highlight-color: transparent;
        transition: all .12s;
      }
      .add-btn:active { filter: brightness(1.2); transform: scale(0.95); }

      /* ══ Chat ══ */
      .chat-msgs {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }
      .msg { display: flex; gap: 8px; align-items: flex-end; }
      .msg.u { flex-direction: row-reverse; }
      .msg-av {
        width: 28px; height: 28px;
        border-radius: 50%;
        background: var(--s4);
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; flex-shrink: 0;
        color: var(--t2);
      }
      .u .msg-av { background: var(--blue); color: #fff; }
      .msg-bub {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.4;
        letter-spacing: -0.1px;
      }
      .msg:not(.u) .msg-bub { background: var(--s3); border-bottom-left-radius: 6px; }
      .u .msg-bub { background: var(--blue); border-bottom-right-radius: 6px; }
      .chat-bar {
        display: flex;
        gap: 8px;
        padding: 10px 14px;
        border-top: 0.5px solid var(--sep);
        flex-shrink: 0;
        background: var(--s1);
      }
      .chat-input {
        flex: 1;
        background: var(--s3);
        border: 1px solid var(--s5);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 22px;
        font-size: 15px;
        outline: none;
        font-family: var(--font);
        transition: border-color .15s;
      }
      .chat-input:focus { border-color: var(--blue); }
      .chat-send {
        background: var(--blue);
        border: none;
        color: #fff;
        width: 38px; height: 38px;
        border-radius: 50%;
        cursor: pointer;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        -webkit-tap-highlight-color: transparent;
        transition: all .12s;
      }
      .chat-send:active { transform: scale(0.9); }
      .chat-send svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

      /* Chat page */
      .chat-page .content { padding: 0; padding-bottom: 0; display: flex; flex-direction: column; overflow: hidden; }
      .chat-page .chat-bar { position: fixed; bottom: calc(var(--tab-h) + var(--safe-b)); left: 0; right: 0; z-index: 50; }
      .chat-page .content { padding-bottom: calc(var(--tab-h) + var(--safe-b) + 62px); }
      .chat-page .chat-msgs { flex: 1; overflow-y: auto; }

      /* ══ List items ══ */
      .ls-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 12px 16px;
        border-bottom: 0.5px solid var(--sep);
      }
      .ls-item:last-child { border-bottom: none; }
      .ls-top { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
      .ls-title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.2px;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .badge-ok { color: var(--green); background: var(--green-dim); }
      .badge-warn { color: var(--yell); background: var(--yell-dim); }
      .badge-err { color: var(--red); background: var(--red-dim); }
      .badge-def { color: var(--t2); background: rgba(255,255,255,0.04); }
      .ls-detail { font-size: 13px; color: var(--t2); }
      .ls-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--t3);
        font-family: var(--mono);
        font-variant-numeric: tabular-nums;
      }

      /* ══ Forms ══ */
      .form-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px 16px;
      }
      .f-date, .f-select {
        background: var(--s3);
        border: 1px solid var(--s5);
        color: var(--text);
        border-radius: var(--rs);
        padding: 10px 12px;
        font-size: 14px;
        font-family: var(--font);
        flex: 1;
        min-width: 0;
      }
      .f-btn {
        background: var(--blue);
        border: none;
        color: #fff;
        padding: 10px 16px;
        border-radius: var(--rs);
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        flex: 0 0 auto;
      }
      .f-btn:active { filter: brightness(1.15); transform: scale(0.97); }
      .f-btn-sec {
        background: var(--s4);
        color: var(--text);
      }

      /* ══ Log ══ */
      .log-pane {
        overflow: auto;
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.6;
        color: var(--t2);
        background: var(--s1);
        white-space: pre-wrap;
        max-height: 280px;
        border-radius: 0 0 var(--r) var(--r);
      }

      /* ══ Toast ══ */
      .toast {
        padding: 8px 14px;
        margin: 0 0 10px;
        border-radius: var(--rs);
        font-size: 13px;
        font-weight: 500;
        text-align: center;
      }
      .toast-ok { background: var(--green-dim); color: var(--green); }
      .toast-err { background: var(--red-dim); color: var(--red); }

      /* ══ Section title ══ */
      .section-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.4px;
        padding: 4px 2px 10px;
      }

      /* ══ Empty ══ */
      .empty {
        padding: 28px 16px;
        text-align: center;
        color: var(--t3);
        font-size: 14px;
      }

      /* ══ Loading ══ */
      .spinner { font-size: 11px; color: var(--t3); letter-spacing: 3px; animation: pulse 1s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: .15; } 50% { opacity: 1; } }
      .spin { animation: sp .6s linear infinite; }
      @keyframes sp { to { transform: rotate(360deg); } }

      /* ══ HTMX ══ */
      .htmx-indicator { opacity: 0; transition: opacity .2s; }
      .htmx-request .htmx-indicator { opacity: 1; }
      .htmx-request .sync-lbl { display: none; }
      input:disabled, button:disabled { opacity: .4; cursor: not-allowed; }

      /* ══ Scrollbar ══ */
      ::-webkit-scrollbar { width: 0; }

      /* ══ Error toast ══ */
      #err-toast {
        position: fixed;
        bottom: calc(var(--tab-h) + var(--safe-b) + 16px);
        left: 16px; right: 16px;
        z-index: 999;
        background: var(--red);
        color: #fff;
        padding: 12px 16px;
        border-radius: var(--rs);
        font-size: 14px;
        font-weight: 500;
        text-align: center;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity .2s, transform .2s;
        pointer-events: none;
      }
      #err-toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    </style>
  </head>
  <body class="{{ page_name|default('dashboard') }}-page">
    <div class="shell">

      <header class="hdr">
        <div class="hdr-title">{% block page_title %}Multiagentes{% endblock %}</div>
        <div class="hdr-right">
          <span class="hdr-clock" id="clk"></span>
          <div class="pill">
            <span class="pill-dot{% if not summary or not summary.focus.guard_running %} off{% endif %}"></span>
            Guard
          </div>
          <button class="hdr-btn"
                  hx-post="/sync"
                  hx-target="#toast-area"
                  hx-swap="innerHTML"
                  hx-indicator="#sync-sp"
                  hx-disabled-elt="this">
            <span id="sync-sp" class="htmx-indicator spin" style="font-size:11px">&#8635;</span>
            <span class="sync-lbl">Sync</span>
          </button>
        </div>
      </header>

      <main class="content">
        <div id="toast-area"></div>
        {% block content %}{% endblock %}
      </main>

      <nav class="tabs">
        <a href="/" class="tab{% if page_name == 'dashboard' %} active{% endif %}">
          <span class="tab-ico"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg></span>
          Home
        </a>
        <a href="/agenda" class="tab{% if page_name == 'agenda' %} active{% endif %}">
          <span class="tab-ico"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
          Agenda
        </a>
        <a href="/tasks-page" class="tab{% if page_name == 'tasks' %} active{% endif %}">
          <span class="tab-ico"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
          Tarefas
        </a>
        <a href="/chat-page" class="tab{% if page_name == 'chat' %} active{% endif %}">
          <span class="tab-ico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></span>
          Chat
        </a>
        <a href="/audit" class="tab{% if page_name == 'audit' %} active{% endif %}">
          <span class="tab-ico"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>
          Audit
          {% if summary and summary.alerts and summary.alerts.pending > 0 %}
          <span class="tab-badge">{{ summary.alerts.pending }}</span>
          {% endif %}
        </a>
      </nav>

    </div>

    <div id="err-toast" role="alert" aria-live="assertive"></div>

    <script>
      !function(){
        function clk(){var e=document.getElementById('clk');if(e)e.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
        clk();setInterval(clk,10000);

        var _t;
        function showErr(m){var t=document.getElementById('err-toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(function(){t.classList.remove('show')},4000)}
        document.body.addEventListener('htmx:responseError',function(e){showErr('Erro '+(e.detail.xhr?e.detail.xhr.status:'?'))});
        document.body.addEventListener('htmx:sendError',function(){showErr('Sem conexao')});

        if('serviceWorker'in navigator)navigator.serviceWorker.register('/static/sw.js').catch(function(){});
      }();
    </script>
  </body>
</html>
